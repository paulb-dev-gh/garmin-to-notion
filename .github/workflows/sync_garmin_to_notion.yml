name: Sync Garmin to Notion
on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:

env:
  TZ: 'Europe/Paris'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run scripts
        id: garmin_sync                          # ← id nécessaire pour lire l'output
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}    # ← nouveau secret
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PR_DB_ID: ${{ secrets.NOTION_PR_DB_ID }}
          NOTION_STEPS_DB_ID: ${{ secrets.NOTION_STEPS_DB_ID }}
          NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}
          GARMIN_ACTIVITIES_FETCH_LIMIT: ${{ vars.GARMIN_ACTIVITIES_FETCH_LIMIT }}
          TZ: 'America/Montreal'
        run: |
          python garmin-activities.py
          python personal-records.py
          python daily-steps.py
          python sleep-data.py

      # ← Nouveau : persister les tokens si régénérés
      - name: Update GARMIN_TOKENS secret if refreshed
        if: steps.garmin_sync.outputs.garmin_tokens != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}        # ← Personal Access Token avec scope "secrets"
        run: |
          gh secret set GARMIN_TOKENS \
            --body "${{ steps.garmin_sync.outputs.garmin_tokens }}" \
            --repo ${{ github.repository }}
